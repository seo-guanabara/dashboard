name: Fetch SEO Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Autenticar no Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Buscar dados das APIs
        env:
          SEMRUSH_API_KEY:  ${{ secrets.SEMRUSH_API_KEY }}
          GTMETRIX_API_KEY: ${{ secrets.GTMETRIX_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commitar data.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add data.json
          git diff --staged --quiet || git commit -m "data: update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
