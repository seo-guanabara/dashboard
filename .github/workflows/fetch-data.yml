name: Fetch SEO Data

on:
  schedule:
    - cron: '0 8 * * *'   # 05:00 BRT todo dia
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Autenticar no Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/363592984559/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'seo-dashboard@guanabara-seo.iam.gserviceaccount.com'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Buscar dados das APIs
        env:
          SEMRUSH_API_KEY:          ${{ secrets.SEMRUSH_API_KEY }}
          GTMETRIX_API_KEY:         ${{ secrets.GTMETRIX_API_KEY }}
          GA4_OAUTH_CLIENT_ID:      ${{ secrets.GA4_OAUTH_CLIENT_ID }}
          GA4_OAUTH_CLIENT_SECRET:  ${{ secrets.GA4_OAUTH_CLIENT_SECRET }}
          GA4_OAUTH_REFRESH_TOKEN:  ${{ secrets.GA4_OAUTH_REFRESH_TOKEN }}
        run: python scripts/fetch_data.py

      - name: Commitar data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update data.json [skip ci]"
          git push
